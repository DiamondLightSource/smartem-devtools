apiVersion: v1
kind: ConfigMap
metadata:
  name: smartem-config
  namespace: smartem-decisions-staging
data:
  # These are fallback values used if ./scripts/k8s/dev-k8s.sh is not used
  # The script will dynamically override these with values from .env.staging
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "smartem_db"
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  HTTP_API_PORT: "8000"
  ADMINER_PORT: "8080"
  CORS_ALLOWED_ORIGINS: "https://staging.example.com"
  # Keycloak OIDC integration. The backend rejects every non-exempt
  # request that doesn't carry a valid Bearer token (always-on since
  # smartem-decisions#285). Defaults below target the DLS test realm;
  # override per environment via .env. KEYCLOAK_ALLOWED_AZP is the
  # comma-separated azp allow-list; unset means any valid token from
  # the realm is accepted.
  KEYCLOAK_URL: "https://identity-test.diamond.ac.uk"
  KEYCLOAK_REALM: "dls"
  KEYCLOAK_VERIFY_ISS: "true"
  KEYCLOAK_ALLOWED_AZP: "SmartEM_User,SmartEM_Agent"
