apiVersion: v1
kind: ConfigMap
metadata:
  name: smartem-config
  namespace: smartem-decisions-staging
data:
  # These are fallback values used if ./scripts/k8s/dev-k8s.sh is not used
  # The script will dynamically override these with values from .env.staging
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "smartem_db"
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  HTTP_API_PORT: "8000"
  ADMINER_PORT: "8080"
  CORS_ALLOWED_ORIGINS: "https://staging.example.com"
  # Keycloak OIDC integration. KEYCLOAK_AUTH_REQUIRED=true rejects all
  # non-exempt requests that don't carry a valid Bearer token. Defaults
  # below target the DLS test realm; override per environment via .env.
  KEYCLOAK_AUTH_REQUIRED: "true"
  KEYCLOAK_URL: "https://identity-test.diamond.ac.uk"
  KEYCLOAK_REALM: "dls"
  KEYCLOAK_CLIENT_ID: "SmartEM"
  KEYCLOAK_VERIFY_ISS: "true"
