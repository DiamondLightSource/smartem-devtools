apiVersion: v1
kind: ConfigMap
metadata:
  name: smartem-config
  namespace: smartem-decisions-production
data:
  # These are fallback values used if ./scripts/k8s/dev-k8s.sh is not used
  # The script will dynamically override these with values from .env.production
  #
  # PostgreSQL, RabbitMQ, MongoDB, Elasticsearch and Keycloak are externally
  # managed services in this environment (provided by DLS infra). Host values
  # below are placeholders and MUST be overridden via .env.production before
  # deploying.
  POSTGRES_HOST: "OVERRIDE-FROM-ENV"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "smartem_db"
  RABBITMQ_HOST: "OVERRIDE-FROM-ENV"
  RABBITMQ_PORT: "5672"
  HTTP_API_PORT: "8000"
  CORS_ALLOWED_ORIGINS: "https://smartem.diamond.ac.uk"
  # Keycloak OIDC integration. The backend rejects every non-exempt
  # request that doesn't carry a valid Bearer token (always-on since
  # smartem-decisions#285). KEYCLOAK_ALLOWED_AZP is the comma-separated
  # azp allow-list; unset means any valid token from the realm is accepted.
  KEYCLOAK_URL: "https://identity.diamond.ac.uk"
  KEYCLOAK_REALM: "dls"
  KEYCLOAK_VERIFY_ISS: "true"
  KEYCLOAK_ALLOWED_AZP: "SmartEM_User,SmartEM_Agent"
