apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartem-frontend-ingress
  namespace: smartem-decisions-production
  annotations:
    # Adjust to the cluster's ingress controller (nginx-ingress shown).
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
  # TODO: replace placeholder with the real production hostname.
  # The SPA pod's nginx reverse-proxies /api/ to smartem-http-api-service
  # internally, so a single route covering / is sufficient.
  - host: smartem.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: smartem-frontend-service
            port:
              number: 80
